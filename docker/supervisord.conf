; Runs the queue worker and scheduler alongside the Octane web server.
; On the minimal (2GB) profile the queue driver is 'database'; the same worker
; command drains it. Horizon replaces this block on the standard profile.
[program:queue]
command=php /app/artisan queue:work --sleep=1 --tries=3 --max-time=3600
autostart=true
autorestart=true
stopwaitsecs=3600

[program:scheduler]
command=php /app/artisan schedule:work
autostart=true
autorestart=true
